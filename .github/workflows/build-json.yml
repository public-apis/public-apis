name: Build JSON from README

on:
  push:
    branches: [ master ]
    paths:
      - "README.md"
      - "scripts/generate.js"


permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-json
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate apis.json / apis.min.json / category.json
        run: node scripts/generate.js README.md dist

      - name: Commit generated JSON if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate apis.json / category.json from README.md"
          file_pattern: "dist/*.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
